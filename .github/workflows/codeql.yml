name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '27 18 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Required for Spring Boot — lets CodeQL actually compile and analyze bytecode.
      # Change 21 to whichever Java version your project targets.
      - name: Set up Java
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # or 'gradle' if you use Gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended adds SQL injection, path traversal, SSRF etc.
          # Highly recommended for a Spring Boot + Postgres stack.
          queries: security-extended

      # autobuild handles Maven and Gradle automatically.
      # If it fails, switch build-mode to 'manual' above and use the step below instead:
      #
      # - name: Manual build
      #   if: matrix.language == 'java-kotlin'
      #   run: ./mvnw clean package -DskipTests
      #   # or: ./gradlew build -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
